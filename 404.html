<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Yusuf - Portfolio</title>
  <script>
    var path = window.location.pathname;
    var repoName = '/Yusuf-portfolio';
    
    // Build the full correct URL
    var fullPath = repoName;
    if (path.startsWith(repoName)) {
      var redirectPath = path.replace(repoName, '');
      if (redirectPath && redirectPath !== '/') {
        fullPath = repoName + '/?p=' + encodeURIComponent(redirectPath);
      }
    }
    
    // Redirect to the correct path
    window.location.replace(fullPath);
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
