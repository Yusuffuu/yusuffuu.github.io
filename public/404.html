<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Yusuf - Portfolio</title>
  <script>
    var path = window.location.pathname;
    var repoName = '/Yusuf-portfolio';
    
    if (path.startsWith(repoName)) {
      var redirectPath = path.replace(repoName, '');
      window.location.href = repoName + '/?p=' + encodeURIComponent(redirectPath);
    } else {
      window.location.href = repoName + '/?p=/';
    }
  </script>
</head>
<body>
  <p>Redirecting to Yusuf's Portfolio...</p>
</body>
</html>S
