<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Yusuf - Portfolio</title>
  <script>
    // Get the current URL path
    var path = window.location.pathname;
    // Remove the repo name from the path
    var repoName = '/Yusuf-portfolio';
    var redirectPath = path.replace(repoName, '');
    // Redirect to index.html with the path as a query parameter
    window.location.href = repoName + '/?p=' + encodeURIComponent(redirectPath);
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
